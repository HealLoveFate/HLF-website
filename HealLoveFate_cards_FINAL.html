<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heal Love Fate · 療癒牌卡</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D3AF37;
  --gold-soft:rgba(211,175,55,.4);
  --peach1:#f7ddd0;
  --peach2:#e0aa80;
  --text-deep:#3a1c08;
  --text-mid:rgba(80,40,10,.65);
  /* page palette */
  --pg1:#FFDCDC;
  --pg2:#FFF2EB;
  --pg3:#FFE8CD;
  --pg4:#FFD6BA;
  --pg5:#D3AF37;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(160deg, #FFDCDC 0%, #FFF2EB 30%, #FFE8CD 60%, #FFD6BA 100%);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Noto Serif TC',serif;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(211,175,55,.12) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, rgba(255,214,186,.6) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 0%,  rgba(255,220,220,.5) 0%, transparent 40%);
  pointer-events:none;
}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.star{position:absolute;width:1.5px;height:1.5px;background:#D3AF37;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op)}}
.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px;width:100%;max-width:480px;}

/* page logo */
.logo-area{text-align:center;margin-bottom:36px;animation:fadeDown 1s ease forwards;opacity:0;}
.logo-top{width:70px;height:70px;margin:0 auto 10px;}
.logo-top img{width:100%;height:100%;object-fit:contain;}
.logo-en{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.38em;color:#9a7010;text-transform:uppercase;margin-bottom:3px;}
.logo-zh{font-size:10px;letter-spacing:.2em;color:rgba(154,112,16,.6);}

/* instruction */
.instruction{text-align:center;margin-bottom:28px;animation:fadeUp 1s .2s ease forwards;opacity:0;}
.instruction-text{font-size:12px;letter-spacing:.15em;color:rgba(120,80,30,.6);line-height:2.2;}
.instruction-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.1em;color:rgba(120,80,30,.4);margin-top:2px;}
.breath-dots{display:flex;gap:10px;justify-content:center;margin-top:10px;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(211,175,55,.3);transition:background .5s,transform .5s;}
.dot.active{background:#D3AF37;transform:scale(1.4);}

/* card */
.card-wrap{animation:fadeUp 1s .4s ease forwards;opacity:0;}
.card{width:300px;height:460px;border-radius:20px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.card-bg{position:absolute;inset:0;background:linear-gradient(150deg,var(--peach1) 0%,#f2cdb5 38%,#eabf9e 65%,var(--peach2) 100%);border-radius:20px;}
.deco{position:absolute;inset:0;z-index:4;pointer-events:none;width:100%;height:100%;}

/* cover */
.card-cover{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;border-radius:20px;}
.cover-logo-wrap{position:relative;z-index:3;width:148px;height:148px;}
.cover-logo-wrap img{width:100%;height:100%;object-fit:contain;}
.cover-texts{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:8px;position:relative;z-index:3;}
.cover-brand{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.45em;color:rgba(90,45,10,.55);text-transform:uppercase;}
.cover-hint{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:.38em;color:rgba(90,45,10,.3);text-transform:uppercase;}

/* result */
.card-result{position:absolute;inset:0;z-index:2;border-radius:20px;display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:32px 26px 22px;}
.card-result.visible{display:flex;}
.rule{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative;flex-shrink:0;}
.rule::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--gold);font-size:8px;}
.msg{z-index:5;text-align:center;padding:0 6px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.msg-zh{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:400;line-height:2.1;color:var(--text-deep);max-width:240px;word-break:keep-all;overflow-wrap:break-word;}
.msg-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;line-height:1.85;color:var(--text-mid);max-width:232px;}
.card-foot{z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:100%;gap:6px;}
.foot-logo{width:48px;height:48px;flex-shrink:0;}
.foot-logo img{width:100%;height:100%;object-fit:contain;}
.foot-rule{width:80px;height:1px;background:linear-gradient(90deg,transparent,#D3AF37,transparent);position:relative;}
.foot-rule::after{content:"✦";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#D3AF37;font-size:7px;}
.foot-text{font-family:'Cormorant Garamond',serif;font-size:8px;letter-spacing:.28em;color:rgba(90,45,10,.35);text-transform:uppercase;}

/* button */
.draw-again-btn{
  margin-top:22px;
  display:none;
  flex-direction:column;align-items:center;gap:2px;
  padding:13px 44px;
  background:linear-gradient(135deg,#FFF2EB,#FFE8CD);
  border:1.5px solid #D3AF37;
  color:#8a6010;
  font-family:'Cormorant Garamond',serif;
  cursor:pointer;
  border-radius:40px;
  box-shadow:0 2px 14px rgba(211,175,55,.22);
  transition:background .3s,box-shadow .3s,transform .15s;
}
.draw-again-btn.show{display:flex;}
.draw-again-btn:hover{
  background:linear-gradient(135deg,#FFE8CD,#FFD6BA);
  box-shadow:0 5px 20px rgba(211,175,55,.38);
  transform:translateY(-1px);
}
.btn-zh{font-size:13px;letter-spacing:.3em;font-family:'Noto Serif TC',serif;}
.btn-en{font-size:10px;letter-spacing:.22em;opacity:.7;font-style:italic;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  {zh:"你不需要像任何人，你只需要更像你自己。",en:"You don't need to be like anyone else. Just more of yourself."},
  {zh:"你的故事，沒有人可以替你說。",en:"No one can tell your story the way you can."},
  {zh:"你的存在本身就是一種貢獻。",en:"Your presence in this world is already a contribution."},
  {zh:"做你自己，不是自私，是對這個世界最真實的給予。",en:"Being yourself isn't selfish — it's the most genuine gift you can offer."},
  {zh:"你比你自己以為的更有能力。",en:"You are more capable than you currently believe."},
  {zh:"就算看起來走錯了路，那條路也給了你現在的你。",en:"Even the wrong paths brought you here. Nothing was wasted."},
  {zh:"你不需要所有人都同意，你才可以繼續走。",en:"You don't need everyone's approval to keep moving forward."},
  {zh:"懷疑自己的時候，就想想你已經做到的那些事。",en:"When doubt creeps in, remember what you've already managed to do."},
  {zh:"你的聲音值得被聽見，包括你自己要先聽見它。",en:"Your voice deserves to be heard — starting with being heard by yourself."},
  {zh:"你願意來到這裡，就已經是相信自己的開始。",en:"Showing up here — that was already an act of trusting yourself."},
  {zh:"你現在是安全的。真的。",en:"You are safe right now. Truly."},
  {zh:"你的身體記得怎麼放鬆，讓它慢慢來。",en:"Your body knows how to release. Give it the time it needs."},
  {zh:"就算過去不安全，現在的你已經在更穩的地方了。",en:"Even if the past felt unsafe, you have landed somewhere steadier now."},
  {zh:"你可以慢下來，世界不會因此崩掉。",en:"You can slow down. The world will hold together without you rushing."},
  {zh:"你被允許休息，不只是在累壞之後。",en:"You are allowed to rest — not just when you've broken down, but before."},
  {zh:"根，是讓你走得更遠的東西，不是把你綁住的東西。",en:"Roots are what let you grow further — not what hold you back."},
  {zh:"你有能力為自己創造安全感，一步一步來。",en:"You are capable of building safety for yourself — slowly, steadily."},
  {zh:"你早就知道答案了，只是還不確定自己知道。",en:"You already know the answer. You're just not sure you trust it yet."},
  {zh:"那個一閃而過的念頭，值得你多看一眼。",en:"That fleeting thought that crossed your mind — it deserves a second look."},
  {zh:"感覺對，不需要邏輯上的許可。",en:"Something feeling right doesn't need logical permission."},
  {zh:"你的直覺不是幻覺，是你積累了很久的智慧。",en:"Your intuition isn't imagination — it's wisdom you've been gathering your whole life."},
  {zh:"當你猶豫的時候，問問你的身體，它通常比腦袋更誠實。",en:"When you're unsure, ask your body. It's usually more honest than your mind."},
  {zh:"慢下來，你的答案不在外面，在裡面。",en:"Slow down. Your answers aren't out there — they're in here."},
  {zh:"你有一種方式看世界，那是任何人都學不來的。",en:"You see the world in a way no one else can replicate."},
  {zh:"玩，也是一種創造。",en:"Play is also a form of creation."},
  {zh:"你的聲音、你的故事、你的視角，都是這個世界需要的。",en:"Your voice, your stories, your perspective — the world needs all of it."},
  {zh:"你不需要每天都狀態很好，起伏本來就是人的一部分。",en:"You don't have to be at your best every day. Highs and lows are simply part of being human."},
  {zh:"對自己嚴格久了，偶爾溫柔一次，不是放棄，是需要。",en:"After being hard on yourself for so long, allowing a moment of gentleness isn't giving up — it's what you need."},
  {zh:"你不需要假裝沒事，你可以有情緒，可以需要時間。",en:"You don't have to pretend everything is fine. You're allowed to feel, and you're allowed to take your time."},
  {zh:"你不需要每個決定都是對的，你只需要每次都是真實的。",en:"You don't need every decision to be right. You just need each one to be honest."},
  {zh:"你允許別人犯錯，也請允許自己。",en:"You extend grace to others when they make mistakes. Please extend that same grace to yourself."},
  {zh:"不喜歡現在的狀態，可以。但在那之前，先好好陪著自己。",en:"It's okay not to like where you are right now. But before anything else — stay with yourself gently."},
  {zh:"你比自己以為的更值得被溫柔對待。",en:"You deserve more tenderness than you've been allowing yourself to receive."},
  {zh:"接受自己的不完美，不是認輸，是真正認識自己的開始。",en:"Accepting your imperfections isn't surrender — it's the beginning of truly knowing yourself."},
  {zh:"你的存在不需要被任何人證明。",en:"Your existence doesn't need anyone's proof or permission."},
  {zh:"你感覺到了什麼，就讓它在這裡，不需要趕它走。",en:"Whatever you're feeling right now — let it be here. You don't have to rush it away."},
  {zh:"不需要把所有感受都搞懂，允許自己「還不知道」。",en:"You don't have to understand everything you feel. It's okay to say 'I don't know yet.'"},
  {zh:"今天的你，已經做了你能做的，這就夠了。",en:"Today, you did what you could. That is enough."},
  {zh:"你曾經以為過不去的事，你都過去了。",en:"Every thing you once thought you couldn't survive — you got through all of it."},
  {zh:"那個一直被你壓下去的念頭，也許正在等你給它一個機會。",en:"That thought you keep pushing down — maybe it's been waiting for you to give it a chance."},
  {zh:"改變不一定有人陪你，但你可以陪著自己。",en:"Change doesn't always come with company. But you can be there for yourself."},
  {zh:"你不需要被所有人理解，才能走你自己的路。",en:"You don't need everyone to understand you in order to walk your own path."},
  {zh:"害怕可以有，行動也可以有，兩件事可以同時存在。",en:"Fear and action can coexist. You don't have to wait until the fear is gone."},
  {zh:"你的勇氣不一定看得見，但它一直在。",en:"Your courage isn't always visible — but it has always been there."},
  {zh:"你值得一段不需要時時刻刻證明自己的關係。",en:"You deserve a relationship where you don't have to constantly prove your worth."},
  {zh:"你付出的那些，也值得有人回應。",en:"What you give deserves to be received and returned."},
  {zh:"有人珍惜你，你也可以學著珍惜自己。",en:"Someone out there treasures you. You can learn to treasure yourself too."},
  {zh:"被需要很好，但你不只是因為有用才值得被愛。",en:"Being needed feels good — but you are worthy of love beyond what you do for others."},
  {zh:"你值得的愛，是讓你感到安心的那種，不是讓你焦慮的那種。",en:"The love you deserve is the kind that brings you peace — not the kind that keeps you anxious."},
  {zh:"你可以對自己溫柔，就像你對你最愛的人那樣。",en:"You can be as gentle with yourself as you are with the people you love most."},
  {zh:"你不需要完美，才能被真正愛你的人所愛。",en:"You don't need to be perfect to be loved by the people who truly love you."},
  {zh:"你愛人的方式那麼真，你也值得被同樣真實地愛。",en:"The way you love others is so genuine — you deserve to be loved just as genuinely in return."},
  {zh:"你走的這條路，沒有人走過，這是你的，不是錯的。",en:"No one has walked this exact path before you. It's yours — and that doesn't make it wrong."},
  {zh:"你的感受方式，你的思考方式，沒有人可以複製。",en:"The way you feel, the way you think — no one else can replicate that."},
  {zh:"你以為平凡的那些，對某些人來說是光。",en:"What feels ordinary to you can be someone else's light."},
  {zh:"你不需要跟別人一樣快，你的速度就是你的節奏。",en:"You don't need to move at anyone else's pace. Your rhythm is the right one for you."},
  {zh:"你身上有一些東西，是你自己還沒有發現的寶。",en:"There is something in you that you haven't discovered yet — and it's worth finding."},
  {zh:"你看世界的方式，有時候連你自己都還沒意識到有多珍貴。",en:"The way you see the world is more precious than you've allowed yourself to realize."},
  {zh:"那個對自己說「我不行」的聲音，不一定是真的。",en:"That voice telling you 'I can't do this' — it isn't necessarily telling the truth."},
  {zh:"你做過的決定，每一個都是當時最好的你所能做的選擇。",en:"Every decision you've made was the best choice the version of you at that time could make."},
  {zh:"你的直覺帶你到了現在，請繼續相信它。",en:"Your intuition brought you to where you are now. Keep trusting it."},
  {zh:"那些你以為自己做不到的事，你已經默默做了很多。",en:"So many things you thought you couldn't do — you've quietly done them already."},
  {zh:"你值得有一個讓你覺得安心的地方，那個地方可以是你自己。",en:"You deserve a place that feels safe — and that place can be yourself."},
  {zh:"你的邊界是合理的，不需要為它道歉。",en:"Your boundaries are reasonable. You don't have to apologize for having them."},
  {zh:"你不需要把所有人都照顧好，才能照顧自己。",en:"You don't have to take care of everyone else before you're allowed to take care of yourself."},
  {zh:"安定感不是找到的，是你一點一點給自己建造的。",en:"A sense of safety isn't something you find — it's something you build for yourself, slowly."},
  {zh:"你現在感到疲憊，是因為你承擔了很多，讓自己休息一下。",en:"The tiredness you feel is because you've been carrying so much. Let yourself rest."},
  {zh:"那些你扛著的，你可以先放下來，喘一口氣。",en:"What you've been carrying — you can set it down for a moment and breathe."},
  {zh:"那個讓你心裡不舒服的感覺，是在告訴你一些事情。",en:"That uneasy feeling inside you is trying to tell you something worth listening to."},
  {zh:"你知道的比你以為的多，靜下來，你會聽到。",en:"You know more than you think. Get quiet enough, and you'll hear it."},
  {zh:"你不需要把每個直覺都解釋給別人聽，你只需要聽見它。",en:"You don't need to justify every intuition to others. You just need to hear it yourself."},
  {zh:"有時候你的身體比你的腦袋更早知道答案。",en:"Sometimes your body knows the answer before your mind catches up."},
  {zh:"你的感受不需要被任何人驗證，才算是真實的。",en:"Your feelings don't need anyone's validation to be real."},
  {zh:"放慢一點，讓自己的聲音有機會浮出來。",en:"Slow down a little — give your own voice a chance to rise."},
  {zh:"你的直覺不是障礙，是導航。",en:"Your intuition isn't an obstacle. It's your compass."},
  {zh:"你那個還沒完成的想法，不需要等到完美才值得被開始。",en:"That unfinished idea of yours doesn't need to be perfect before it's worth starting."},
  {zh:"你創造的東西，帶著只有你才有的溫度。",en:"What you create carries a warmth that only you can give it."},
  {zh:"不知道怎麼做沒關係，先動手，方向會在過程中出現。",en:"Not knowing how is okay. Start anyway — the direction will emerge as you go."},
  {zh:"那個「只是想試試看」的念頭，有時候會帶你去很遠的地方。",en:"That 'just want to try' thought — sometimes it takes you further than you imagined."},
  {zh:"你做的事情不需要讓所有人懂，只需要讓你自己感到真實。",en:"What you do doesn't need to make sense to everyone — it just needs to feel true to you."},
  {zh:"創作是你跟自己對話的方式之一，不管形式是什麼。",en:"Creating is one of the ways you have a conversation with yourself — whatever form it takes."},
  {zh:"你留下的東西，不管多小，都是這個世界上獨一無二的印記。",en:"Whatever you leave behind — however small — is a mark on this world that no one else could make."},
  {zh:"你可以放下那件事了，它不再需要你繼續扛著。",en:"You can let that go now. It doesn't need you to keep carrying it."},
  {zh:"原諒自己，不是忘記，是讓自己可以繼續走。",en:"Forgiving yourself isn't forgetting — it's giving yourself permission to keep moving."},
  {zh:"有些事情放下了，才有空間裝新的東西進來。",en:"Some things need to be released before there's room for something new to arrive."},
  {zh:"你已經走過了很多，那些經歷讓你的腳更穩。",en:"You've been through so much — and all of it has made your footing steadier."},
  {zh:"你屬於這個世界，這個世界也屬於你。",en:"You belong to this world, and this world belongs to you."},
  {zh:"你的身體是你的家，它一直在支撐著你。",en:"Your body is your home — and it has been holding you up all along."},
  {zh:"就算周圍在動盪，你內心的根基是屬於你的。",en:"Even when everything around you shifts, the ground within you is yours to keep."},
  {zh:"你的情感是你的力量，不是你的弱點。",en:"Your emotions are your strength, not your weakness."},
  {zh:"你有感受，你有渴望，這都是活著最真實的樣子。",en:"You feel deeply, you long for things — that is what being truly alive looks like."},
  {zh:"允許自己去享受，去感受，去流動。",en:"Allow yourself to enjoy, to feel, to move with the flow of life."},
  {zh:"你的創造力不需要被任何框架定義。",en:"Your creativity doesn't need to be defined by any framework."},
  {zh:"你值得去追求那些讓你感到活著的事物。",en:"You deserve to pursue the things that make you feel truly alive."},
  {zh:"你有能力感受喜悅，你也值得去接收它。",en:"You are capable of feeling joy — and you deserve to let it in."},
  {zh:"你的柔軟不是脆弱，是你最真實的部分。",en:"Your softness isn't weakness — it's the most authentic part of you."},
  {zh:"你有能力決定自己的方向，這個力量一直都在你身上。",en:"You have the power to choose your own direction — that power has always been yours."},
  {zh:"你有能力影響自己的生命，一個選擇、一個行動、一步一步來。",en:"You have the power to shape your own life — one choice, one step at a time."},
  {zh:"你不需要縮著自己來配合別人的舒適，你有權利佔滿屬於你的空間。",en:"You don't need to make yourself smaller for anyone else's comfort. You have every right to take up your space."},
  {zh:"你的自信不需要別人的許可，它是你自己給自己的。",en:"Your confidence doesn't need anyone's permission — it's something you give to yourself."},
  {zh:"你可以說不，你可以說是，你的選擇是你的。",en:"You can say no. You can say yes. Your choices belong to you."},
  {zh:"那個想要站起來的你，值得被支持，尤其是被你自己。",en:"The part of you that wants to rise deserves support — especially from yourself."},
  {zh:"你的心很大，大到裝得下別人，也請記得留一塊給自己。",en:"Your heart is big enough to hold so many others — please remember to save a piece of it for yourself."},
  {zh:"你向別人打開過心，現在試著也對自己打開一次。",en:"You've opened your heart to others — now try opening it to yourself, just once."},
  {zh:"你付出的愛不會消失，它會回來，以各種形式。",en:"The love you give doesn't disappear — it finds its way back to you, in many forms."},
  {zh:"你不需要完美地去愛，真實地去愛就夠了。",en:"You don't need to love perfectly — loving honestly is enough."},
  {zh:"你的溫柔是這個世界需要的，包括你自己也需要。",en:"Your gentleness is something this world needs — and so do you."},
  {zh:"連結從自己開始，當你跟自己在一起，你就不孤單。",en:"Connection begins with yourself — when you are with yourself, you are never truly alone."},
  {zh:"你的聲音值得被聽見，先從你自己開始聽見它。",en:"Your voice deserves to be heard — start by hearing it yourself."},
  {zh:"你說出來的話，可以改變你和別人的世界。",en:"The words you speak have the power to change your world and someone else's."},
  {zh:"你的沉默有時候是保護，但你的聲音也是力量。",en:"Your silence is sometimes protection — but your voice is also power."},
  {zh:"你的感受值得被表達，不只是藏在心裡。",en:"What you feel deserves to be expressed — not just kept quietly inside."},
  {zh:"你比你以為的更能看清楚事情的本質。",en:"You see through things more clearly than you give yourself credit for."},
  {zh:"那個你一直感覺到但說不出來的，是你的智慧在說話。",en:"That thing you keep sensing but can't quite put into words — that is your wisdom speaking."},
  {zh:"你的直覺是累積了很久的智慧，請相信它。",en:"Your intuition is wisdom gathered over a lifetime — please trust it."},
  {zh:"你的內在視野比外在的雜音更值得被聽從。",en:"Your inner vision is more worth following than the noise outside."},
  {zh:"當你放下需要控制一切的力氣，你會感覺到一種更大的安靜。",en:"When you release the need to control everything, you will find a deeper kind of stillness."},
];

const starsEl=document.getElementById("stars");
for(let i=0;i<70;i++){
  const s=document.createElement("div");s.className="star";
  s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";
  s.style.setProperty("--d",(2+Math.random()*5)+"s");
  s.style.setProperty("--op",0.2+Math.random()*0.5);
  s.style.animationDelay=Math.random()*5+"s";
  starsEl.appendChild(s);
}
let di=0;
const dots=[document.getElementById("d1"),document.getElementById("d2"),document.getElementById("d3")];
setInterval(()=>{dots.forEach(d=>d.classList.remove("active"));dots[di].classList.add("active");di=(di+1)%3;},1400);
const cover=document.getElementById("cover");
const result=document.getElementById("result");
const againBtn=document.getElementById("againBtn");
let last=-1;
document.getElementById("card").addEventListener("click",()=>{
  if(cover.style.display==="none")return;
  let idx;
  do{idx=Math.floor(Math.random()*cards.length);}while(idx===last&&cards.length>1);
  last=idx;
  document.getElementById("msgZh").textContent=cards[idx].zh;
  document.getElementById("msgEn").textContent=cards[idx].en;
  cover.style.display="none";
  result.classList.add("visible");
  againBtn.classList.add("show");
});
againBtn.addEventListener("click",()=>{
  result.classList.remove("visible");
  cover.style.display="flex";
});
</script>
